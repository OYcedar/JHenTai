name: Docker Build & Publish

on:
  push:
    branches:
      - master
    tags:
      - v*
    paths:
      - 'server/**'
      - 'lib/src/main_web.dart'
      - 'lib/src/pages_web/**'
      - 'lib/src/network/backend_api_client.dart'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'docker-compose.yml'
      - 'docker/fork_revision'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref_name }}
  cancel-in-progress: true

env:
  DOCKERHUB_REPO: hemumoe/jhentai

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image tag (x.y.z-hhh, hhh = 3-digit fork rev hex)
        id: version
        run: |
          FULL=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          VERSION=$(echo "$FULL" | cut -d+ -f1)
          if [ -f docker/fork_revision ]; then
            RAW=$(head -n1 docker/fork_revision | tr -d '[:space:]')
          else
            RAW=$(echo "$FULL" | cut -s -d+ -f2)
            [ -z "$RAW" ] && RAW=0
          fi
          case "$RAW" in ''|*[!0-9]*) echo "::error::docker/fork_revision (or pubspec +build) must be a decimal integer 0–4095, got: $RAW"; exit 1 ;; esac
          FORK_DEC=$((10#$RAW))
          if [ "$FORK_DEC" -gt 4095 ] || [ "$FORK_DEC" -lt 0 ]; then
            echo "::error::Fork revision must be 0–4095 (maps to 3 hex digits), got: $FORK_DEC"
            exit 1
          fi
          FORK_HEX=$(printf '%03x' "$FORK_DEC")
          IMAGE_TAG="${VERSION}-${FORK_HEX}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "fork_hex=$FORK_HEX" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Will push ${IMAGE_TAG} to Docker Hub"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=${{ steps.version.outputs.image_tag }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: hemumoe
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: hemumoe
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPO }}
          readme-filepath: ./DOCKER.md
          short-description: "JHenTai web+Docker deployment — browse E-Hentai from any browser"
